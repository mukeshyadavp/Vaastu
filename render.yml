services:
  - type: web
    name: vaastu-fullstack
    env: python
    plan: free
    region: oregon
    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7

    buildCommand: |
      pip install --upgrade pip
      pip install --no-cache-dir -r backend/requirements.txt
      npm install
      npm run build

    startCommand: |
      cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT app:app